<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排行榜 - NewWorld</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#2f2a48;color:#e4e0f0;min-height:100vh;background-image:radial-gradient(ellipse at 40% 15%,rgba(120,100,200,.12) 0%,transparent 55%),radial-gradient(ellipse at 60% 85%,rgba(90,110,190,.08) 0%,transparent 50%);padding:2rem}
.container{max-width:700px;margin:0 auto}
.top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
.top-bar h1{font-size:1.4rem;color:#e4e0f0;letter-spacing:1px}
.top-bar a{color:#b0a8d0;text-decoration:none;font-size:.85rem;padding:.3rem .8rem;border:1px solid #4e4880;border-radius:6px;transition:.2s}
.top-bar a:hover{background:rgba(90,70,160,.15)}
.tabs{display:flex;gap:.4rem;margin-bottom:1.2rem;flex-wrap:wrap}
.tab{padding:.35rem 1.1rem;border-radius:999px;font-size:.8rem;cursor:pointer;border:1px solid #484070;background:transparent;color:#b0a8d0;transition:.2s}
.tab:hover{border-color:#6a6298;background:rgba(90,70,160,.15)}
.tab.active{background:rgba(75,65,130,.55);color:#e4e0f0;border-color:#686098}
.card{background:rgba(42,36,64,.6);border:1px solid #484070;border-radius:14px;padding:1.1rem;backdrop-filter:blur(10px);margin-bottom:1.4rem;box-shadow:0 2px 24px rgba(0,0,0,.18)}
.empty{text-align:center;color:#8a84a8;padding:1.5rem;font-size:.8rem}
.empty .icon{font-size:2rem;display:block;margin-bottom:.3rem}
.row{display:flex;align-items:center;gap:.6rem;padding:.5rem .4rem;border-bottom:1px solid #363058;transition:.2s}
.row:last-child{border-bottom:none}
.row:hover{background:rgba(55,45,90,.25);border-radius:8px}
.rank{width:26px;text-align:center;font-weight:600;font-size:.85rem;flex-shrink:0}
.rank-1{color:#d0a870}
.rank-2{color:#b0b0b0}
.rank-3{color:#b89070}
.avatar{width:36px;height:36px;border-radius:50%;background:rgba(75,65,130,.55);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:600;color:#e4e0f0;flex-shrink:0;overflow:hidden}
.name{flex:1;font-size:.85rem;color:#e0dcf0;font-weight:500;min-width:0}
.stat{font-size:.78rem;color:#8a84a8;text-align:right;white-space:nowrap}
.stat .num{color:#c8e0c8;font-weight:600}
.stat .num.gold{color:#d0a870}
.stat .num.pink{color:#d0a0a0}
.stat .num.blue{color:#80a0c8}
.hint{font-size:.72rem;color:#7a7498;margin-top:.4rem;text-align:center}
.medal{display:inline-block}
@media(max-width:480px){.row{padding:.45rem .3rem}.name{font-size:.8rem}}
.uc{position:fixed;z-index:999;background:rgba(40,34,62,.96);border:1px solid #585090;border-radius:12px;padding:1.2rem;min-width:150px;text-align:center;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.4);opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s;pointer-events:none}
.uc.s{opacity:1;visibility:visible}
.uc .p{width:80px;height:80px;border-radius:50%;margin:0 auto .6rem;display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:#e4e0f0;overflow:hidden;background:rgba(75,65,130,.55)}
.uc .p img{width:100%;height:100%;object-fit:cover}
.uc .n{font-size:.9rem;color:#e0dcf0;font-weight:600}
.uc .r{font-size:.7rem;color:#8a84a8;margin-top:.15rem}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1>🏆 排行榜</h1>
    <div style="display:flex;gap:.5rem;align-items:center">
      <a href="/forum">论坛</a>
      <a href="/">首页</a>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('playtime',this)">⏱ 在线时长</button>
    <button class="tab" onclick="switchTab('forum',this)">📝 论坛活跃</button>
    <button class="tab" onclick="switchTab('history',this)">👋 历史玩家</button>
  </div>

  <div id="playtimePanel">
    <div class="card">
      <h2 style="font-size:.95rem;margin-bottom:.7rem;color:#b0c8d8;font-weight:400;letter-spacing:1px">⏱ 在线时长排行</h2>
      <div id="playtimeList"><div class="empty"><span class="icon">⏳</span>加载中...</div></div>
      <div class="hint">每 60 秒更新一次 · 仅统计服务器启动后的时长</div>
    </div>
  </div>

  <div id="forumPanel" style="display:none">
    <div class="card">
      <h2 style="font-size:.95rem;margin-bottom:.7rem;color:#d0b8a8;font-weight:400;letter-spacing:1px">📝 论坛活跃排行</h2>
      <div id="forumList"><div class="empty"><span class="icon">📭</span>加载中...</div></div>
    </div>
  </div>

  <div id="historyPanel" style="display:none">
    <div class="card">
      <h2 style="font-size:.95rem;margin-bottom:.7rem;color:#b8a0c8;font-weight:400;letter-spacing:1px">👋 曾登录过的玩家</h2>
      <div id="historyList"><div class="empty"><span class="icon">📋</span>加载中...</div></div>
    </div>
  </div>
</div>

<script>
async function loadLeaderboard() {
  try {
    const r = await fetch('/api/leaderboard');
    const d = await r.json();
    if (!d.ok) return;
    renderPlaytime(d.playtime);
    renderForum(d.forum);
    renderHistory(d.history);
  } catch(e) {}
}

function getRankClass(i) {
  if (i === 0) return 'rank-1';
  if (i === 1) return 'rank-2';
  if (i === 2) return 'rank-3';
  return '';
}

function getRankIcon(i) {
  if (i === 0) return '🥇';
  if (i === 1) return '🥈';
  if (i === 2) return '🥉';
  return '';
}

function formatTime(seconds) {
  if (!seconds || seconds < 60) return '< 1 分钟';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  if (h > 0) return h + ' 小时 ' + m + ' 分钟';
  return m + ' 分钟';
}

function avatarHtml(url, name) {
  return url ? '<img src="' + url + '" style="width:100%;height:100%;object-fit:cover">' : name.charAt(0).toUpperCase();
}

function renderPlaytime(data) {
  const el = document.getElementById('playtimeList');
  if (!data || data.length === 0) {
    el.innerHTML = '<div class="empty"><span class="icon">⏳</span>暂无数据<br><span style="font-size:.8rem;color:#888;margin-top:.3rem;display:block">等待玩家上线...</span></div>';
    return;
  }
  el.innerHTML = data.map((p, i) =>
    '<div class="row">' +
      '<div class="rank ' + getRankClass(i) + '">' + (i < 3 ? getRankIcon(i) : (i + 1)) + '</div>' +
      '<div class="avatar"' + (p.avatar ? ' style="background:none"' : '') + ' data-u="' + p.username + '" data-r="用户">' + avatarHtml(p.avatar, p.username) + '</div>' +
      '<div class="name">' + p.username + '</div>' +
      '<div class="stat"><span class="num gold">' + formatTime(p.playtime_seconds) + '</span></div>' +
    '</div>'
  ).join('');
}

function renderForum(data) {
  const el = document.getElementById('forumList');
  if (!data || data.length === 0) {
    el.innerHTML = '<div class="empty"><span class="icon">📭</span>暂无数据</div>';
    return;
  }
  el.innerHTML = data.map((p, i) =>
    '<div class="row">' +
      '<div class="rank ' + getRankClass(i) + '">' + (i < 3 ? getRankIcon(i) : (i + 1)) + '</div>' +
      '<div class="avatar"' + (p.avatar ? ' style="background:none"' : '') + ' data-u="' + p.username + '" data-r="用户">' + avatarHtml(p.avatar, p.username) + '</div>' +
      '<div class="name">' + p.username + '</div>' +
      '<div class="stat">📄 <span class="num blue">' + p.posts + '</span> · 💬 <span class="num pink">' + p.replies + '</span></div>' +
    '</div>'
  ).join('');
}

function renderHistory(data) {
  const el = document.getElementById('historyList');
  if (!data || data.length === 0) {
    el.innerHTML = '<div class="empty"><span class="icon">📋</span>暂无记录</div>';
    return;
  }
  el.innerHTML = data.map((p, i) =>
    '<div class="row">' +
      '<div class="rank">#' + (i + 1) + '</div>' +
      '<div class="avatar" data-u="' + p.username + '" data-r="用户">' + p.username.charAt(0).toUpperCase() + '</div>' +
      '<div class="name">' + p.username + '</div>' +
      '<div class="stat" style="color:#888;font-size:.72rem">曾登录此服务器</div>' +
    '</div>'
  ).join('');
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('playtimePanel').style.display = name === 'playtime' ? 'block' : 'none';
  document.getElementById('forumPanel').style.display = name === 'forum' ? 'block' : 'none';
  document.getElementById('historyPanel').style.display = name === 'history' ? 'block' : 'none';
}

loadLeaderboard();
setInterval(loadLeaderboard, 30000);
(function(){var c,t;document.addEventListener('mouseover',function(e){var a=e.target.closest('[data-u]');if(!a||a.dataset.t)return;var u=a.dataset.u;a.dataset.t=setTimeout(function(){if(!c){c=document.createElement('div');c.className='uc';c.innerHTML='<div class="p"></div><div class="n"></div><div class="r"></div>';document.body.appendChild(c)}var r=a.getBoundingClientRect(),p=c.querySelector('.p'),n=c.querySelector('.n'),l=c.querySelector('.r');p.innerHTML='';var i=a.querySelector('img');if(i)p.appendChild(i.cloneNode());else p.textContent=u.charAt(0).toUpperCase();n.textContent=u;l.textContent=a.dataset.r||'用户';c.classList.add('s');var x=r.left+r.width/2-75,y=r.top-c.offsetHeight-10;if(y<10)y=r.bottom+10;c.style.left=Math.max(5,x)+'px';c.style.top=y+'px'},1000)}),document.addEventListener('mouseout',function(e){var a=e.target.closest('[data-u]');if(!a)return;if(a.dataset.t){clearTimeout(parseInt(a.dataset.t));delete a.dataset.t}if(c)c.classList.remove('s')})})();
document.addEventListener('click',function(e){var a=e.target.closest('[data-u]');if(a&&!a.closest('.uc')){e.stopPropagation();if(a.dataset.u)window.location.href='/user?username='+encodeURIComponent(a.dataset.u)}});
</script>
</body>
</html>
