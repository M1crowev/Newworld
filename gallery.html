<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片画廊 - NewWorld</title>
<link rel="stylesheet" href="/common.css">
<script src="/common.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#2f2a48;color:#e4e0f0;min-height:100vh;background-image:radial-gradient(ellipse at 40% 15%,rgba(120,100,200,.12) 0%,transparent 55%),radial-gradient(ellipse at 60% 85%,rgba(90,110,190,.08) 0%,transparent 50%);padding:2rem}
.container{max-width:900px;margin:0 auto}
.top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;margin-bottom:1.2rem}
.top-bar h1{font-size:1.3rem;color:#e4e0f0;letter-spacing:1px}
.top-bar a{color:#b0a8d0;text-decoration:none;font-size:.85rem;padding:.3rem .8rem;border:1px solid #4e4880;border-radius:6px;transition:.2s}
.top-bar a:hover{background:rgba(90,70,160,.15)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.6rem}
.grid img{width:100%;height:160px;object-fit:cover;border-radius:10px;cursor:pointer;border:1px solid #484070;transition:.2s}
.grid img:hover{border-color:#6a6298;transform:scale(1.02);box-shadow:0 4px 16px rgba(50,40,100,.2)}
.empty{text-align:center;color:#8a84a8;padding:2rem;font-size:.85rem}
.empty .icon{font-size:2rem;display:block;margin-bottom:.3rem}
.count{font-size:.78rem;color:#7a7498;margin-bottom:.8rem}
@media(max-width:480px){body{padding:1rem}.grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}.grid img{height:120px}}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1>🖼️ 图片画廊</h1>
    <div style="display:flex;gap:.5rem;align-items:center">
      <span class="theme-switcher-wrap"></span>
      <a href="/">← 首页</a>
    </div>
  </div>
  <div id="count" class="count">加载中...</div>
  <div class="grid" id="gallery"></div>
  <button class="back-top" id="backTop">↑</button>
</div>
<script>
async function loadGallery() {
  try {
    const r = await fetch('/api/gallery');
    const d = await r.json();
    const el = document.getElementById('gallery');
    const ct = document.getElementById('count');
    if (!d.ok || !d.images || d.images.length === 0) {
      el.innerHTML = '<div class="empty"><span class="icon">🖼️</span>暂无图片</div>';
      ct.textContent = '暂无图片';
      return;
    }
    ct.textContent = '共 ' + d.images.length + ' 张图片';
    el.innerHTML = d.images.map(img => '<img src="' + img.url + '" class="lightbox-trigger">').join('');
  } catch(e) { document.getElementById('gallery').innerHTML = '<div class="empty">加载失败</div>'; }
}
loadGallery();
initTheme(); initBackTop(); initLightbox();
</script>
</body>
</html>
