server {
    server_name NewWorld.largemodel.online;
    root /var/www/newworld;
    index index.html index.htm;
    client_max_body_size 10m;
    location /api/ {
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    location /mods/ {
        alias /var/www/newworld/mods/;
        charset utf-8;
    }

    location /uploads/ {
        alias /var/www/newworld/uploads/;
        expires 7d;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/newworld.largemodel.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/newworld.largemodel.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = newworld.largemodel.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name NewWorld.largemodel.online;
    return 404; # managed by Certbot


}