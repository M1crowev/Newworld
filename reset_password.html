<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重置密码 - NewWorld</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#2f2a48;color:#e4e0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background-image:radial-gradient(ellipse at 40% 15%,rgba(120,100,200,.12) 0%,transparent 55%),radial-gradient(ellipse at 60% 85%,rgba(90,110,190,.08) 0%,transparent 50%)}
.card{background:rgba(42,36,64,.6);border:1px solid #484070;border-radius:14px;padding:2rem;backdrop-filter:blur(10px);box-shadow:0 2px 24px rgba(0,0,0,.18);width:100%;max-width:380px;text-align:center}
.card h2{font-size:1.1rem;color:#c0b8d8;font-weight:400;letter-spacing:2px;margin-bottom:1rem}
input{width:100%;padding:.55rem .75rem;margin-bottom:.6rem;border:1px solid #484070;border-radius:8px;background:#282448;color:#e0dcf0;font-size:.85rem;outline:none}
input:focus{border-color:#6a6298}
.btn{width:100%;padding:.55rem;border:none;border-radius:8px;font-size:.85rem;cursor:pointer;background:rgba(75,65,130,.55);color:#e4e0f0;transition:.2s}
.btn:hover{background:rgba(85,75,150,.65)}
.error{color:#d07a7a;font-size:.75rem;display:none;margin-bottom:.4rem}
.success{color:#c8e0c8;font-size:.85rem;margin-bottom:.5rem}
a{color:#b0a8d0;text-decoration:none;font-size:.8rem;display:inline-block;margin-top:.7rem}
a:hover{color:#ddd8f0}
</style>
</head>
<body>
<div class="card">
  <h2>🔑 重置密码</h2>
  <div class="error" id="err"></div>
  <div id="form">
    <input id="pw" type="password" placeholder="新密码（至少4个字符）">
    <button class="btn" onclick="resetPw()">确认重置</button>
  </div>
  <div id="done" style="display:none">
    <div class="success">✅ 密码已重置，请重新登录</div>
    <a href="/">← 返回首页</a>
  </div>
  <a href="/">← 返回首页</a>
</div>
<script>
async function resetPw() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (!token) { document.getElementById('err').textContent='链接无效'; document.getElementById('err').style.display='block'; return; }
  const pw = document.getElementById('pw').value;
  if (pw.length < 4) { document.getElementById('err').textContent='密码至少4个字符'; document.getElementById('err').style.display='block'; return; }
  try {
    const r = await fetch('/api/reset_password', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, new_password: pw})});
    const d = await r.json();
    if (d.ok) { document.getElementById('form').style.display='none'; document.getElementById('done').style.display='block'; document.getElementById('err').style.display='none'; }
    else { document.getElementById('err').textContent=d.error; document.getElementById('err').style.display='block'; }
  } catch(e) { document.getElementById('err').textContent='网络错误'; document.getElementById('err').style.display='block'; }
}
</script>
</body>
</html>
